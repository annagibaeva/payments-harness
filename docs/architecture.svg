<svg viewBox="0 0 960 1010" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-labelledby="ttl desc">
  <title id="ttl">Payments Assistant Eval &amp; Reliability Harness — architecture</title>
  <desc id="desc">A single-run release-gate pipeline: versioned inputs are schema-validated, run k times through a cassette-backed runner and a payments assistant over mock data, scored deterministically with a hallucination detector registry, checked against four release gates and a pinned regression baseline, then emitted as a report and a pass/fail exit code.</desc>

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L7,4.5 L0,9 Z" fill="#94A3B8"/></marker>
    <marker id="ahs" markerWidth="9" markerHeight="9" refX="2" refY="4.5" orient="auto"><path d="M7,0 L0,4.5 L7,9 Z" fill="#94A3B8"/></marker>
  </defs>

  <rect x="0" y="0" width="960" height="1010" fill="#F8FAFC"/>

  <!-- Header -->
  <text x="480" y="44" text-anchor="middle" font-size="25" font-weight="700" fill="#0F172A">Payments Assistant — Eval &amp; Reliability Harness</text>
  <text x="480" y="70" text-anchor="middle" font-size="14" fill="#475569">One run → a defensible PASS / FAIL ship verdict for a payments AI assistant</text>

  <!-- connectors (spine) -->
  <g stroke="#94A3B8" stroke-width="2">
    <line x1="480" y1="164" x2="480" y2="192" marker-end="url(#ah)"/>
    <line x1="480" y1="240" x2="480" y2="268" marker-end="url(#ah)"/>
    <line x1="480" y1="356" x2="480" y2="384" marker-end="url(#ah)"/>
    <line x1="480" y1="466" x2="480" y2="494" marker-end="url(#ah)"/>
    <line x1="480" y1="636" x2="480" y2="664" marker-end="url(#ah)"/>
    <line x1="480" y1="816" x2="480" y2="844" marker-end="url(#ah)"/>
    <line x1="480" y1="904" x2="480" y2="932" marker-end="url(#ah)"/>
  </g>
  <!-- side connectors (double headed) -->
  <line x1="762" y1="313" x2="796" y2="313" stroke="#94A3B8" stroke-width="2" marker-end="url(#ah)" marker-start="url(#ahs)"/>
  <line x1="762" y1="426" x2="796" y2="426" stroke="#94A3B8" stroke-width="2" marker-end="url(#ah)" marker-start="url(#ahs)"/>

  <!-- Stage 1: Inputs -->
  <rect x="200" y="98" width="560" height="66" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="230" cy="131" r="15" fill="#3B82F6"/><text x="230" y="136" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">1</text>
  <text x="258" y="126" font-size="15" font-weight="700" fill="#0F172A">Inputs — versioned</text>
  <text x="258" y="148" font-size="12.5" fill="#475569">tasks.yaml + fixtures.yaml  (15 tasks · mock data)</text>

  <!-- Stage 2: Schema validation -->
  <rect x="200" y="192" width="560" height="48" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="230" cy="216" r="15" fill="#64748B"/><text x="230" y="221" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">2</text>
  <text x="258" y="212" font-size="15" font-weight="700" fill="#0F172A">Schema validation</text>
  <text x="258" y="230" font-size="12.5" fill="#475569">pydantic · unique ids · fail loud on typo</text>

  <!-- Stage 3: Runner + Cassette -->
  <rect x="200" y="268" width="560" height="88" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="230" cy="312" r="15" fill="#8B5CF6"/><text x="230" y="317" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">3</text>
  <text x="258" y="304" font-size="15" font-weight="700" fill="#0F172A">Runner</text>
  <text x="258" y="326" font-size="12.5" fill="#475569">k = 5 repeats · bounded concurrency + retry</text>
  <text x="258" y="344" font-size="12" fill="#7C3AED">replay = reproducible  ·  live = measured by pass^k</text>
  <rect x="796" y="280" width="150" height="66" rx="10" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="871" y="308" text-anchor="middle" font-size="13.5" font-weight="700" fill="#5B21B6">Cassette</text>
  <text x="871" y="326" text-anchor="middle" font-size="11" fill="#6D28D9">responses/*.jsonl</text>
  <text x="871" y="340" text-anchor="middle" font-size="11" fill="#6D28D9">record / replay</text>

  <!-- Stage 4: Agent + Mock data -->
  <rect x="200" y="384" width="560" height="82" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="230" cy="425" r="15" fill="#14B8A6"/><text x="230" y="430" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">4</text>
  <text x="258" y="416" font-size="15" font-weight="700" fill="#0F172A">Agent under test</text>
  <text x="258" y="438" font-size="12.5" fill="#475569">claude-haiku · system prompt + canary token</text>
  <text x="258" y="456" font-size="12" fill="#0F766E">read-only — cannot move money or reveal secrets</text>
  <rect x="796" y="394" width="150" height="64" rx="10" fill="#F0FDFA" stroke="#14B8A6" stroke-width="1.5"/>
  <text x="871" y="421" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0F766E">Mock data</text>
  <text x="871" y="439" text-anchor="middle" font-size="11" fill="#0D9488">accounts · FX · fees</text>
  <text x="871" y="453" text-anchor="middle" font-size="11" fill="#0D9488">frozen fixtures</text>

  <!-- Stage 5: Scorer -->
  <rect x="140" y="494" width="680" height="142" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="172" cy="524" r="15" fill="#F97316"/><text x="172" y="529" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">5</text>
  <text x="200" y="529" font-size="15" font-weight="700" fill="#0F172A">Scorer — fully deterministic (no LLM in v1)</text>
  <rect x="160" y="548" width="200" height="74" rx="9" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.3"/>
  <text x="260" y="572" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9A3412">Facts</text>
  <text x="260" y="591" text-anchor="middle" font-size="11" fill="#9A3412">answer: numeric · contains_all</text>
  <text x="260" y="606" text-anchor="middle" font-size="11" fill="#9A3412">refuse = no detector fired</text>
  <rect x="380" y="548" width="200" height="74" rx="9" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.3"/>
  <text x="480" y="572" text-anchor="middle" font-size="12.5" font-weight="700" fill="#991B1B">Detector registry</text>
  <text x="480" y="591" text-anchor="middle" font-size="11" fill="#991B1B">canary · amount · action</text>
  <text x="480" y="606" text-anchor="middle" font-size="11" fill="#991B1B">hard hallucination check</text>
  <rect x="600" y="548" width="200" height="74" rx="9" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="700" y="572" text-anchor="middle" font-size="12.5" font-weight="700" fill="#94A3B8">LLM judge</text>
  <text x="700" y="591" text-anchor="middle" font-size="11" fill="#94A3B8">deferred to V2</text>
  <text x="700" y="606" text-anchor="middle" font-size="11" fill="#94A3B8">(off the gate path)</text>

  <!-- Stage 6: Gates -->
  <rect x="140" y="664" width="680" height="152" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="172" cy="694" r="15" fill="#EF4444"/><text x="172" y="699" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">6</text>
  <text x="200" y="699" font-size="15" font-weight="700" fill="#0F172A">Release gates  →  verdict = AND of all gates</text>
  <rect x="160" y="718" width="152" height="86" rx="9" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.3"/>
  <text x="236" y="744" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">Accuracy</text>
  <text x="236" y="766" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">≥ 93%</text>
  <text x="236" y="788" text-anchor="middle" font-size="10.5" fill="#15803D">14 / 15 tasks</text>
  <rect x="324" y="718" width="152" height="86" rx="9" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
  <text x="400" y="744" text-anchor="middle" font-size="12.5" font-weight="700" fill="#991B1B">Hallucination</text>
  <text x="400" y="766" text-anchor="middle" font-size="18" font-weight="700" fill="#991B1B">0 · HARD</text>
  <text x="400" y="788" text-anchor="middle" font-size="10.5" fill="#B91C1C">zero tolerance</text>
  <rect x="488" y="718" width="152" height="86" rx="9" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.3"/>
  <text x="564" y="744" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">pass^k  (k=5)</text>
  <text x="564" y="766" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">87% / 100%</text>
  <text x="564" y="788" text-anchor="middle" font-size="10.5" fill="#15803D">general / safety</text>
  <rect x="652" y="718" width="152" height="86" rx="9" fill="#FEFCE8" stroke="#FACC15" stroke-width="1.3"/>
  <text x="728" y="744" text-anchor="middle" font-size="12.5" font-weight="700" fill="#854D0E">Cost · Latency</text>
  <text x="728" y="766" text-anchor="middle" font-size="14" font-weight="700" fill="#854D0E">≤$0.05 · ≤3s</text>
  <text x="728" y="788" text-anchor="middle" font-size="10.5" fill="#A16207">cost blocks · lat warns</text>

  <!-- Stage 7: Regression -->
  <rect x="200" y="844" width="560" height="60" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="230" cy="874" r="15" fill="#EAB308"/><text x="230" y="879" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">7</text>
  <text x="258" y="870" font-size="15" font-weight="700" fill="#0F172A">Regression vs pinned baseline</text>
  <text x="258" y="892" font-size="12.5" fill="#475569">version-aware · human-updated · no-op on first run</text>

  <!-- Stage 8: Output -->
  <rect x="200" y="932" width="560" height="62" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="230" cy="963" r="15" fill="#22C55E"/><text x="230" y="968" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">8</text>
  <text x="258" y="959" font-size="15" font-weight="700" fill="#0F172A">Report + exit code</text>
  <text x="258" y="981" font-size="12.5" fill="#475569">flush report.json + dashboard.html  →  exit 0 (green) / 1 (red)</text>
</svg>
